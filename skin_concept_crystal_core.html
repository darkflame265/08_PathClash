<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>크리스탈 코어 — 스킨 컨셉 저장본</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0a0e14;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 48px 24px;
  }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
    padding: 4px 14px; border-radius: 20px;
    background: rgba(147,197,253,.12); color: #93c5fd;
    border: 1px solid rgba(147,197,253,.28);
  }
  h1 {
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, #bae6fd, #e0f2fe, #fff, #93c5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .stage {
    width: 220px; height: 220px;
    position: relative; display: flex;
    align-items: center; justify-content: center;
  }

  /* ── 크리스탈 코어 ── */
  .piece-a {
    position: relative; width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle at 42% 35%,
      #e0f2fe 0%, #bae6fd 18%, #38bdf8 40%, #0369a1 68%, #082f49 88%, #020d1a 100%);
    border: 2px solid rgba(186,230,253,.65);
    box-shadow:
      0 0 18px rgba(186,230,253,.35),
      0 0 45px rgba(56,189,248,.18),
      inset 0 0 14px rgba(224,242,254,.12);
    animation: a-pulse 3s ease-in-out infinite;
    overflow: visible;
  }
  .piece-a::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background:
      linear-gradient(32deg, transparent 48%, rgba(224,242,254,.15) 48.5%, transparent 49%),
      linear-gradient(105deg, transparent 42%, rgba(186,230,253,.12) 42.5%, transparent 43%),
      linear-gradient(158deg, transparent 38%, rgba(224,242,254,.10) 38.5%, transparent 39%),
      linear-gradient(210deg, transparent 55%, rgba(147,197,253,.10) 55.5%, transparent 56%);
  }
  .a-core {
    position: absolute; width: 50px; height: 50px; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: radial-gradient(circle at 40% 35%, #ffffff 0%, #e0f2fe 30%, #7dd3fc 60%, #0284c7 100%);
    box-shadow: 0 0 18px rgba(224,242,254,.9), 0 0 36px rgba(56,189,248,.55);
    animation: a-core-pulse 2.5s ease-in-out infinite;
  }
  .a-ring {
    position: absolute; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .a-ring-1 { width: 192px; height: 192px; border: 1.5px solid rgba(186,230,253,.55); animation: a-spin-cw 10s linear infinite; }
  .a-ring-2 { width: 220px; height: 220px; border: 1.5px solid rgba(147,197,253,.38); animation: a-spin-ccw 18s linear infinite; }
  .a-ring-3 { width: 248px; height: 248px; border: 1px solid rgba(96,165,250,.22); animation: a-spin-cw 30s linear infinite; }
  .a-tick {
    position: absolute; left: 50%; top: 0;
    border-radius: 999px; background: rgba(186,230,253,.8);
    transform-origin: .75px 96px; transform: rotate(var(--ang));
  }
  .a-tick-sm { width: 1.5px; height: 5px; margin-left: -.75px; }
  .a-tick-lg { width: 1.5px; height: 9px; margin-left: -.75px; background: rgba(224,242,254,.95); }
  .a-shard {
    position: absolute; left: 50%; top: 50%;
    animation: a-shard-orbit var(--spd) linear infinite var(--dly);
  }
  .a-shard::before {
    content: ''; display: block; width: 8px; height: 8px;
    background: radial-gradient(circle at 30% 30%, #e0f2fe, #38bdf8);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: 0 0 8px rgba(56,189,248,.9);
    animation: a-shard-spin var(--spd) linear infinite reverse var(--dly);
  }
  .a-snow {
    position: absolute; border-radius: 50%;
    background: rgba(224,242,254,.7); box-shadow: 0 0 4px rgba(186,230,253,.8);
    animation: a-snow-drift var(--dur) ease-in-out infinite var(--dly2);
    left: var(--sx); top: var(--sy);
  }

  @keyframes a-pulse {
    0%,100% { box-shadow: 0 0 18px rgba(186,230,253,.35),0 0 45px rgba(56,189,248,.18),inset 0 0 14px rgba(224,242,254,.12); }
    50%      { box-shadow: 0 0 28px rgba(186,230,253,.55),0 0 65px rgba(56,189,248,.30),inset 0 0 20px rgba(224,242,254,.2); }
  }
  @keyframes a-core-pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .9; }
    50%      { transform: translate(-50%,-50%) scale(1.12); opacity: 1; }
  }
  @keyframes a-spin-cw  { to { transform: translate(-50%,-50%) rotate(360deg); } }
  @keyframes a-spin-ccw { to { transform: translate(-50%,-50%) rotate(-360deg); } }
  @keyframes a-shard-orbit {
    from { transform: rotate(var(--ang)) translateX(110px) translate(-50%,-50%); }
    to   { transform: rotate(calc(var(--ang) + 360deg)) translateX(110px) translate(-50%,-50%); }
  }
  @keyframes a-shard-spin { to { transform: rotate(360deg); } }
  @keyframes a-snow-drift {
    0%,100% { transform: translate(0,0) scale(1); opacity: .7; }
    33%      { transform: translate(var(--dax),var(--day)) scale(1.1); opacity: .9; }
    66%      { transform: translate(var(--dbx),var(--dby)) scale(.85); opacity: .5; }
  }

  .notes { font-size: 12px; color: #475569; text-align: center; max-width: 360px; line-height: 1.6; }
  .notes strong { color: #93c5fd; }
</style>
</head>
<body>

<div class="badge">저장된 컨셉 — 다른 스킨에 활용</div>
<h1>크리스탈 코어 (Crystal Core)</h1>

<div class="stage">
  <div class="piece-a">
    <div class="a-ring a-ring-1">
      <div class="a-tick a-tick-sm" style="--ang:0deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:30deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:60deg"></div>
      <div class="a-tick a-tick-lg" style="--ang:90deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:120deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:150deg"></div>
      <div class="a-tick a-tick-lg" style="--ang:180deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:210deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:240deg"></div>
      <div class="a-tick a-tick-lg" style="--ang:270deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:300deg"></div>
      <div class="a-tick a-tick-sm" style="--ang:330deg"></div>
    </div>
    <div class="a-ring a-ring-2"></div>
    <div class="a-ring a-ring-3"></div>
    <div class="a-shard" style="--ang:0deg;   --spd:14s; --dly:0s"></div>
    <div class="a-shard" style="--ang:60deg;  --spd:14s; --dly:-2.33s"></div>
    <div class="a-shard" style="--ang:120deg; --spd:14s; --dly:-4.67s"></div>
    <div class="a-shard" style="--ang:180deg; --spd:14s; --dly:-7s"></div>
    <div class="a-shard" style="--ang:240deg; --spd:14s; --dly:-9.33s"></div>
    <div class="a-shard" style="--ang:300deg; --spd:14s; --dly:-11.67s"></div>
    <div class="a-core"></div>
    <div class="a-snow" style="width:3px;height:3px;--sx:22px;--sy:26px;--dur:4.2s;--dly2:0s;--dax:4px;--day:-3px;--dbx:-2px;--dby:5px"></div>
    <div class="a-snow" style="width:2px;height:2px;--sx:110px;--sy:36px;--dur:5.1s;--dly2:-1.5s;--dax:-3px;--day:4px;--dbx:2px;--dby:-2px"></div>
    <div class="a-snow" style="width:2px;height:2px;--sx:46px;--sy:118px;--dur:3.8s;--dly2:-0.8s;--dax:2px;--day:-5px;--dbx:-4px;--dby:2px"></div>
    <div class="a-snow" style="width:2.5px;height:2.5px;--sx:120px;--sy:102px;--dur:4.6s;--dly2:-2.2s;--dax:-4px;--day:-2px;--dbx:3px;--dby:4px"></div>
    <div class="a-snow" style="width:2px;height:2px;--sx:72px;--sy:125px;--dur:5.5s;--dly2:-3s;--dax:3px;--day:2px;--dbx:-2px;--dby:-4px"></div>
  </div>
</div>

<p class="notes">
  <strong>특징:</strong> 기하학적 얼음 링 3개 + 다이아몬드 샤드 6개 공전 + 눈 파티클<br>
  색상: 딥 블루 ~ 아이스 블루 ~ 화이트 코어<br>
  추후 다른 스킨에 활용 예정
</p>

</body>
</html>
